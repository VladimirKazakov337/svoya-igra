<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Svoya Igra - Player</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#1a1a2e;color:white;height:100vh;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.screen{display:none;text-align:center;width:100%;padding:20px}
.screen.active{display:block}
input{padding:15px;margin:10px 0;border-radius:10px;border:1px solid #555;background:#2a2a4a;color:white;font-size:18px;width:100%;max-width:300px}
.btn{padding:15px 30px;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;width:100%;max-width:300px}
.btn-blue{background:#007bff;color:white}.btn-green{background:#28a745;color:white}
.score{font-size:60px;font-weight:bold;margin:20px 0}
.answer-btn{width:220px;height:220px;border-radius:50%;border:none;font-size:28px;font-weight:bold;cursor:pointer;transition:all 0.3s;margin:30px auto}
.answer-btn.waiting{background:#555;color:#888;cursor:not-allowed}
.answer-btn.active{background:#28a745;color:white;animation:pulse 1s infinite;box-shadow:0 0 40px #28a745}
.answer-btn.pressed{background:#ff9800;color:black}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.status{font-size:22px;margin:20px 0;padding:15px;border-radius:10px}
.status.waiting{background:#555}.status.ready{background:#28a745;animation:pulse 1s infinite}
.status.answered{background:#ff9800}
</style>
</head>
<body>

<div id="login" class="screen active">
<h1>Join Game</h1>
<input id="room" placeholder="Room code" maxlength="6" autocomplete="off">
<input id="name" placeholder="Your name" autocomplete="off">
<button class="btn btn-blue" onclick="join()">Join</button>
<p id="err" style="color:#dc3545;margin-top:10px"></p>
</div>

<div id="waiting" class="screen">
<h2>Waiting for game...</h2>
<p>Room: <b id="wroom"></b></p>
<p id="wplayers"></p>
</div>

<div id="game" class="screen">
<div class="score" id="myscore">0</div>
<div class="status waiting" id="status">Waiting...</div>
<div id="bet-area" style="display:none">
  <h3>FINAL - Place your bet</h3>
  <p style="color:#aaa">Max: <span id="max-bet"></span></p>
  <input type="number" id="bet-input" placeholder="Your bet" min="0" style="font-size:24px;text-align:center;width:200px">
  <br><button class="btn btn-green" onclick="placeBet()">SUBMIT BET</button>
</div>
<div id="final-answer-area" style="display:none">
  <h3>FINAL - Your answer</h3>
  <input id="final-answer" placeholder="Your answer" style="font-size:20px;width:90%">
  <br><button class="btn btn-green" onclick="submitFinalAnswer()">SUBMIT ANSWER</button>
</div>
<button class="answer-btn waiting" id="ansbtn" disabled onclick="answer()">ANSWER</button>
</div>

<script>
var ws, room, pid, myName;

function join(){
  room = document.getElementById('room').value.trim().toUpperCase();
  myName = document.getElementById('name').value.trim();
  if(!room||!myName){document.getElementById('err').textContent='Enter code and name';return}
  pid = Math.random().toString(36).substr(2,8);
  ws = new WebSocket('ws://'+window.location.hostname+':8000/ws/'+room+'/'+pid);
  ws.onopen = function(){ ws.send(JSON.stringify({type:'join',name:myName})); };
  ws.onmessage = function(ev){
    var msg = JSON.parse(ev.data);
    if(msg.type==='room_state'){
      show('waiting');
      document.getElementById('wroom').textContent = room;
      document.getElementById('wplayers').textContent = 'Players: '+msg.players_count+'/5';
    }
    if(msg.type==='game_state'){ show('game'); update(msg); }
  };
  ws.onclose = function(){ show('login'); document.getElementById('err').textContent='Disconnected'; };
}

function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  document.getElementById(id).classList.add('active');
}

function update(msg){ document.title = msg.game.phase; 
  var players = msg.players, game = msg.game, me = players[pid];
  if(!me){ console.log('Player not found in players', pid, Object.keys(players)); return; }
  document.getElementById('myscore').textContent = me.score;
  
  // FINAL ROUND
  if(game.phase === 'final' && game.final_phase){
    var fp = game.final_phase || 'betting';
    document.getElementById('ansbtn').style.display = 'none';
    if(fp === 'betting' && !me.has_bet){
      document.getElementById('bet-area').style.display = 'block';
      document.getElementById('final-answer-area').style.display = 'none';
      document.getElementById('status').textContent = 'Place your bet';
      document.getElementById('max-bet').textContent = me.score;
      document.getElementById('bet-input').max = me.score;
    } else if(fp === 'answering' && !me.has_answered){
      document.getElementById('bet-area').style.display = 'none';
      document.getElementById('final-answer-area').style.display = 'block';
      document.getElementById('status').textContent = 'Enter your final answer';
    } else {
      document.getElementById('bet-area').style.display = 'none';
      document.getElementById('final-answer-area').style.display = 'none';
      document.getElementById('status').textContent = 'Waiting for results...';
    }
    return;
  }
  
  // REGULAR GAME
  document.getElementById('bet-area').style.display = 'none';
  document.getElementById('final-answer-area').style.display = 'none';
  document.getElementById('ansbtn').style.display = 'block';
  
  var q = game.current_question;
  var btn = document.getElementById('ansbtn');
  var st = document.getElementById('status');
  
  if(!q){
    st.textContent = 'Waiting for question...';
    st.className = 'status waiting';
    btn.className = 'answer-btn waiting';
    btn.disabled = true;
  } else if(q.status==='selected'){
    st.textContent = 'Host is reading...';
    st.className = 'status waiting';
    btn.className = 'answer-btn waiting';
    btn.disabled = true;
  } else if(q.status==='open'){
    if(me.can_answer){
      st.textContent = 'PRESS TO ANSWER!';
      st.className = 'status ready';
      btn.className = 'answer-btn active';
      btn.disabled = false;
    } else {
      st.textContent = 'Someone is answering...';
      st.className = 'status waiting';
      btn.className = 'answer-btn waiting';
      btn.disabled = true;
    }
  } else if(q.status==='answering'){
    st.textContent = 'Answering...';
    st.className = 'status answered';
    btn.className = 'answer-btn pressed';
    btn.disabled = true;
  } else if(q.status==='answered'){
    st.textContent = 'Correct!';
    st.className = 'status answered';
    btn.className = 'answer-btn pressed';
    btn.disabled = true;
  }
}

function answer(){ ws.send(JSON.stringify({type:'answer_attempt'})); }
function placeBet(){
  var bet = parseInt(document.getElementById('bet-input').value);
  if(!bet || bet<0) return;
  ws.send(JSON.stringify({type:'final_bet', bet:bet}));
  document.getElementById('bet-area').style.display = 'none';
  document.getElementById('status').textContent = 'Bet placed!';
}
function submitFinalAnswer(){
  var ans = document.getElementById('final-answer').value;
  if(!ans) return;
  ws.send(JSON.stringify({type:'final_answer', answer:ans}));
  document.getElementById('final-answer-area').style.display = 'none';
  document.getElementById('status').textContent = 'Answer submitted!';
}
</script>
</body>
</html>
